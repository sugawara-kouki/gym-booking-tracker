openapi: 3.0.0
info:
  title: Gym Booking Tracker API
  version: 1.0.0
  description: 札幌市公共施設予約システムの通知メールを解析し、予約状況を追跡するAPI

servers:
  - url: http://localhost:8787
    description: Local Cloudflare Workers (Wrangler dev)

paths:
  /poc/sync:
    get:
      summary: 同期処理（インジェスト＋パース）
      description: Gmailから新規メールを取り込み、未処理分をすべて解析してDBに保存します。
      tags:
        - Sync
      responses:
        '200':
          description: 同期完了
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      runId:
                        type: string
                        format: uuid
                      success:
                        type: boolean

  /poc/ingest:
    get:
      summary: メールの取り込み（Ingest）のみ実行
      description: Gmail APIを使用して条件に一致する最新メールを取得し、生データを raw_emails テーブルに保存します。
      tags:
        - PoC
      responses:
        '200':
          description: 取り込み完了
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      count:
                        type: integer
                        description: 新しく取り込まれた通数

  /poc/parse-pending:
    get:
      summary: 未処理メールの解析のみ実行
      description: raw_emails テーブルにある pending 状態のデータを解析し、bookings テーブルに反映します。
      tags:
        - PoC
      responses:
        '200':
          description: 解析完了
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      successCount:
                        type: integer
                      errorCount:
                        type: integer
                      runId:
                        type: string
                        format: uuid

  /poc/db-test:
    get:
      summary: DB接続テスト
      description: bookings テーブルの全データを取得し、D1接続を確認します。
      tags:
        - Debug
      responses:
        '200':
          description: 接続成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object

  /poc/db-clear:
    get:
      summary: データベース初期化
      description: 全てのテーブルのデータを削除します（開発用）。
      tags:
        - Debug
      responses:
        '200':
          description: クリア成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /poc/emails:
    get:
      summary: Gmail API 疎通確認
      description: 最新のメール5件をGmail APIから取得し、生のレスポンスを表示します。
      tags:
        - Debug
      responses:
        '200':
          description: 取得成功
